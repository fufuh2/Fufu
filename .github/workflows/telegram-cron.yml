name: APEX 8.0 Telegram Sinyal Motoru

on:
  # schedule:
  #   - cron: '*/15 * * * *'  # Her 15 dakikada bir — DURDURULDU
  workflow_dispatch:          # Manuel tetikleme butonu

jobs:
  send_signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Job max 5 dakika sürer

    steps:
      - name: Sinyal Motorunu Calistir
        env:
          # GitHub Secret ayarlı değilse API'deki fallback değeri kullan
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'deeptradescan-cron-2024' }}
        run: |
          COINS=(
            "BTC" "ETH" "SOL" "XRP" "BNB" "AVAX" "DOGE" "LINK"
            "ADA" "DOT" "INJ" "NEAR" "APT" "SUI" "FET" "RENDER"
            "TAO" "PEPE" "WIF" "TIA" "AR" "STX" "KAS" "AAVE" "RUNE"
          )

          COIN=${COINS[$RANDOM % ${#COINS[@]}]}

          echo "🚀 APEX 8.0 Algoritması Tetikleniyor..."
          echo "🎯 Seçilen Varlık: $COIN"

          # 90s timeout — analiz işlemi 60s'yi aşabilir
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 90 \
            --retry 2 \
            --retry-delay 5 \
            "https://deeptradescan.com/api/telegram-bot?key=${CRON_SECRET}&coin=${COIN}")

          echo "📡 HTTP Durum: $HTTP_STATUS"
          echo "📄 Yanıt:"
          cat response.json
          echo ""

          # 401/403 = auth hatası → gerçek başarısızlık
          if [ "$HTTP_STATUS" -eq 401 ] || [ "$HTTP_STATUS" -eq 403 ]; then
            echo "❌ Kimlik doğrulama hatası — CRON_SECRET GitHub Secret kontrol et."
            exit 1
          fi

          # 5xx = sunucu hatası → başarısızlık
          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "❌ Sunucu hatası (HTTP $HTTP_STATUS)."
            exit 1
          fi

          # Timeout (000) = analiz tamamlanamadı → uyarı, başarısızlık sayma
          if [ "$HTTP_STATUS" -eq 000 ] || [ -z "$HTTP_STATUS" ]; then
            echo "⚠️ Zaman aşımı — analiz 90s içinde tamamlanamadı. Atlanıyor."
            exit 0
          fi

          # 200 = başarılı (sinyal gönderildi veya atlandı — her ikisi de OK)
          echo "✅ İşlem tamamlandı (HTTP $HTTP_STATUS)."
